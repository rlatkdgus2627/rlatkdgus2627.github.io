<!DOCTYPE html>
<html>
	<title>되는게 없어....</title>
	<head>
		<script type="text/javascript">
			var totalclick = 0;
			var answer = 0;
			function qualification(){
				document.getElementById("question").innerHTML = "이것은 문과가 넘볼 수 있는 벽이 아니당!";
				document.getElementById("question").innerHTML += "<p>ㅋㅋㅋㅋㅋ</p>";
				document.getElementById("choice1").style.display = "none";
				document.getElementById("choice2").style.display = "none";
			}

			function visual(){
				switch(totalclick){
					case 1:
						document.getElementById("question").innerHTML = "1+1=?"
						document.getElementById("choice1").innerHTML = "2";
						document.getElementById("choice2").innerHTML = "귀요미!";
						break;
					case 2:
						document.getElementById("question").innerHTML = "'('가 5개, ')'가 5개 있고, 괄호 기호를 모두 사용하였을 때, 올바르지 않은 괄호쌍의 개수는?"
						document.getElementById("choice1").innerHTML = "54";
						document.getElementById("choice2").innerHTML = "56";
						break;
					case 3:
						document.getElementById("question").innerHTML = "1000000000!(십억 팩토리얼)을 개산했을 때, 뒤에서부터 처음 0이 아닌 숫자가 나올 때까지 0의 개수는?"
						document.getElementById("choice1").innerHTML = "249999998";
						document.getElementById("choice2").innerHTML = "250000004";
						break;
					case 4:
						document.getElementById("question").innerHTML = "<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/K%C3%B6nigsberg_graph.svg/2560px-K%C3%B6nigsberg_graph.svg.png' width='400px' height='300px'><br>다음의 그림에서 한붓그리기가 가능한가?"
						document.getElementById("choice1").innerHTML = "예";
						document.getElementById("choice2").innerHTML = "아니오";
						break;
					case 5:
						document.getElementById("question").innerHTML = "7J20IOusuOygnOydmCDsoJXri7XsnYAg7JyE7Kq9"
						document.getElementById("choice1").innerHTML = "이 문제의 정답은 뭘까요?";
						document.getElementById("choice2").innerHTML = "B___ 6_";
						break;
					default:
						document.getElementById("question").innerHTML = "맞은 정답의 수는?";
						document.getElementById("question").innerHTML += answer+"/5";
						document.getElementById("choice1").style.display = "none";
						document.getElementById("choice2").style.display = "none";
						break;
					
				}
			
			}
			
			function inputOne(){
				totalclick=totalclick+1;
				if(totalclick == 2 || totalclick == 4 || totalclick == 6){
					answer = answer + 1;
				}
				visual();
			}
			
			function inputTwo(){
				if(totalclick == 0){
					qualification();
				}
				else{
					totalclick=totalclick+1;
					if(totalclick == 2){
						alert("와....");
					}
					if(totalclick == 3 || totalclick == 5 ){
						answer = answer + 1;
					}
					visual();

				}
			}
		</script>
		
		<style type="text/css">
			body{
				margin: auto;
				text-align:center;
				padding:50px;
			}
			
			#question{
				font-weight:700;
				font-size:72px;
			}
			#answer{
				margin:0 auto;
				margin-top:50px;
				width:1000px;
				height:100%;
			}
			#choice1{
				width:1000px;
				height:100px;
				margin-top:50px;
				background:#673AB7;
				float:left;
				text-align:center;
				color:#ffffff;
				font-size:50px;
				font-weight:700;
				padding-top:25px;
			}
			#choice1:hover{
				background:#888888;
			}
			#choice2{
				width:1000px;
				height:100px;
				margin-top:50px;
				background:#3ad2c4;
				float:left;
				text-align:center;
				color:#ffffff;
				font-size:50px;
				font-weight:700;
				padding-top:25px;
			}
			#choice2:hover{
				background:#888888;
			}
		</style>
		
	</head>
	<body>
		<div id="question">
			그대로 만드는 건 싫으니 수학 문제 테스트!
		</div>
		<div id="answer">
			<div id="choice1" onclick="inputOne()">
			이과
			</div>
			<div id="choice2" onclick="inputTwo()">
			문과
			</div>
		</div>
	</body>
</html>
